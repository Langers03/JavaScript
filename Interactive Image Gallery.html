<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive Image Gallery</title>

<style>

body{
font-family:'Franklin Gothic Medium','Arial Narrow',Arial,sans-serif;
text-align:center;
padding:30px;
}

#gallery{
display:flex;
flex-wrap:wrap;
justify-content:center;
margin-top:30px;
}

.gallery-item{
position:relative;
margin:20px;
}

.gallery-item img{
max-width:200px;
max-height:200px;
cursor:pointer;
transition:transform 0.2s;
}

.gallery-item img:hover{
transform:scale(1.1);
}

.remove-button{
position:absolute;
top:5px;
right:5px;
background-color:blue;
color:white;
border:none;
padding:5px;
cursor:pointer;
display:none;
}

.gallery-item:hover .remove-button{
display:block;
}

</style>
</head>

<body>

<h1>Interactive Image Gallery</h1>

<input type="text" id="imageInput" placeholder="Enter image URL">
<button id="addImageButton">Add Image</button>

<div id="gallery"></div>

<script>

function addImage(){

const imageInput=document.getElementById('imageInput').value;

if(imageInput){

const gallery=document.getElementById('gallery');

const galleryItem=document.createElement('div');
galleryItem.classList.add('gallery-item');

const img=document.createElement('img');
img.src=imageInput;

const removeButton=document.createElement('button');
removeButton.textContent='Remove';
removeButton.classList.add('remove-button');

removeButton.onclick=()=>gallery.removeChild(galleryItem);

galleryItem.appendChild(img);
galleryItem.appendChild(removeButton);

gallery.appendChild(galleryItem);

document.getElementById('imageInput').value='';

}
else{
alert('Please enter an Image URL');
}

}

document.getElementById('addImageButton').addEventListener('click',addImage);

</script>

</body>
</html>
