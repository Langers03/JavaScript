<!DOCTYPE html>
<html>
<head>
    <title>To-Do List</title>
    <link rel="stylesheet" href="Dark Mode Application.css">
</head>
<body>

    <header>
        <h1>Dark and Light Mode</h1>
        <button id="toggleButton" onclick="toggleMode()">
            Switch to Dark Mode
        </button>
    </header>

    <h1>To-Do List</h1>

    <input type="text" id="taskInput" placeholder="Enter a new task">
    <button onclick="addTask()">Add Task</button>
    <ul id="taskList"></ul>

    <script src="Task List Application.js"></script>
</body>
</html>
