<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Array Methods</title>
</head>

<body>
    <div class="container">
        <h1>JavaScript Array Methods</h1>
        <div class="input-group">
            <input id="elementInput" placeholder="Enter element">
            <button onclick="addElement()">Add</button>

            <button onclick="removeElement('first')">Remove First</button>
            <button onclick="removeElement('last')">Remove Last</button>

<div id="arrayElements"></div>
        </div>
        <div class="array-container">
            <h2>Array Elements:</h2>
            <div id="arrayElements"></div>
        </div>
    </div>
    <script src="Arrays.js"></script>
</body>
</html>
