<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Functioning Calculator</title>
    <link rel="stylesheet" type="text/css" href="Calculator 1.css">
</head>
<body>
    <h1>Free Use Calculator</h1>
    <div class="calculator">
     <input type="number" id="number1" placeholder="Enter Number 1">
     <input type="number" id="number2" placeholder="Enter Number 2">
     <div class="Buttons">
        <button onclick="calculate('add')">+</button>
        <button onclick="calculate('subtract')">-</button>
        <button onclick="calculate('multiply')">*</button>
        <button onclick="calculate('divide')">/</button>
     </div>
     <div id="result"></div>
    </div>
    <script src="Calculator 1.js"></script>
</body>
</html>
